<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Everest Studio &amp; Media | Admin</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="site-shell">
      <main class="page-main admin-shell">
        <section class="section">
          <div class="admin-header">
            <div>
              <span class="eyebrow">Inquiry Dashboard</span>
              <h1>Recent inquiries</h1>
              <p class="form-note admin-subtitle">Every form submission from the site is saved here.</p>
            </div>
            <div class="admin-actions">
              <button class="button button-secondary" type="button" data-refresh-button>Refresh</button>
              <button class="button button-secondary" type="button" data-logout-button>Logout</button>
            </div>
          </div>
        </section>

        <section class="section">
          <div class="admin-grid" data-inquiries-list></div>
          <p class="lede" data-inquiries-empty hidden>No inquiries yet.</p>
        </section>
      </main>
      <script src="/script.js"></script>
    </div>
  </body>
</html>
